openapi: 3.1.0
info:
  title: CraftKeeper API
  version: "1.0.0"
  description: >-
    CraftKeeper's versioned, scoped REST API (/api/v1). Every mutation is a
    two-step, human-in-the-loop workflow: an API token may only PROPOSE a
    change (config:propose, plugins:manage, rcon:safe, rcon:admin) or APPLY
    an already-approved one (config:apply) — it can never itself move a
    proposal into the approved state. Only a human administrator, signed in
    to the CraftKeeper web console, can approve a proposed operation; there
    is no endpoint anywhere in this document, and no scope in any token,
    that reaches that action. See the `ApiToken` security scheme below for
    the full list of scopes and the "proposal/approval separation" note on
    each mutating operation.

    There are no webhooks in this version of the API (V1) — CraftKeeper does
    not push events to callers; every state change must be discovered by
    polling GET /api/v1/operations or GET /api/v1/config/proposals. This may
    change in a future API version.

    All timestamps are RFC 3339 UTC (e.g. `2026-07-18T12:00:00Z`). List
    endpoints use opaque, base64-encoded CURSOR pagination via a `cursor`
    query parameter and a `meta.next_cursor` response field — never page
    numbers or offsets. GET /api/v1/config/files/{path} returns an `ETag`
    header derived from the file's real sha256; a matching `If-None-Match`
    short-circuits to 304. Every error response — regardless of which layer
    raised it — is the single flat JSON shape described by the `Error`
    schema: `{code, message, details, correlation_id}`. Every response also
    carries an `X-Correlation-Id` header, echoing a caller-supplied one when
    present.
servers:
  - url: /api/v1
security:
  - ApiToken: []
tags:
  - name: Server
  - name: Config
  - name: Plugins
  - name: Operations

paths:
  /api/v1/server/status:
    get:
      operationId: getServerStatus
      tags: [Server]
      summary: Read current server status (RCON + log availability).
      security:
        - ApiToken: [server:read]
      responses:
        "200":
          description: Current server status snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ServerStatus"
              example:
                data:
                  rcon:
                    available: true
                    reason: null
                    player_count: 3
                    player_names: ["Notch", "jeb_", "Dinnerbone"]
                    sampled_at: "2026-07-18T12:00:00Z"
                  logs:
                    available: true
                    reason: null
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/config/files:
    get:
      operationId: listConfigFiles
      tags: [Config]
      summary: List discovered configuration files (metadata only).
      security:
        - ApiToken: [config:read]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: A cursor-paginated page of config files.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ConfigFile" }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }
              example:
                data:
                  - path: server.properties
                    filename: server.properties
                    format: properties
                    category: server
                    provenance: built-in
                    recognized: true
                    schema_title: Server Properties
                    size_bytes: 1345
                meta: { has_more: false, next_cursor: null }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/config/files/{path}:
    get:
      operationId: getConfigFile
      tags: [Config]
      summary: Read one configuration file's metadata and REDACTED contents.
      description: >-
        `contents` has every schema `secret: true` field masked to
        `••••••` — the exact same redaction pass Task 8's
        App\Config\ConfigDiffBuilder::redactSecrets() applies to the web
        UI's own source-mode preview. The real value is never returned by
        this or any other /api/v1 endpoint. Supports conditional GET via
        `If-None-Match` against the returned `ETag` (the file's real
        sha256).
      security:
        - ApiToken: [config:read]
      parameters:
        - name: path
          in: path
          required: true
          description: The Minecraft-relative config file path.
          schema: { type: string }
          example: server.properties
        - name: If-None-Match
          in: header
          required: false
          schema: { type: string }
      responses:
        "200":
          description: The file's metadata and redacted contents.
          headers:
            ETag: { schema: { type: string }, description: "The file's real sha256, quoted." }
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ConfigFileDetail" }
              example:
                data:
                  path: server.properties
                  filename: server.properties
                  format: properties
                  category: server
                  provenance: built-in
                  recognized: true
                  schema_title: Server Properties
                  size_bytes: 1345
                  modified_at: "2026-07-18T12:00:00Z"
                  base_sha256: "5f0f1f7f1c2b1d7a1e0e6f8b9c0a1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c"
                  contents: "motd=A CraftKeeper server\nrcon.password=••••••\n"
                  validation: { valid: true, diagnostic_count: 0 }
        "304":
          description: The file has not changed since the given If-None-Match ETag.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/config/proposals:
    get:
      operationId: listConfigProposals
      tags: [Config]
      summary: List config.apply/config.restore proposals, most recent first.
      security:
        - ApiToken: [config:read]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: A cursor-paginated page of config proposals.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Operation" }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }
    post:
      operationId: createConfigProposal
      tags: [Config]
      summary: Propose a configuration change. Never writes anything.
      description: >-
        PROPOSAL/APPROVAL SEPARATION: this endpoint only ever creates a
        Proposed operation — it never applies, and never approves,
        anything. A human administrator must separately review and
        approve the proposal in the CraftKeeper web console before
        config:apply (POST .../apply below) can ever execute it. Supports
        an `Idempotency-Key` header: a repeated key on this endpoint
        returns the ORIGINAL proposal instead of creating a duplicate; the
        same key reused with a materially different body instead returns
        409.
      security:
        - ApiToken: [config:propose]
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConfigProposalInput" }
            example:
              path: server.properties
              base_sha256: "5f0f1f7f1c2b1d7a1e0e6f8b9c0a1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c"
              changes:
                - path: motd
                  kind: replace
                  value: "A CraftKeeper server"
      responses:
        "201":
          description: The created (or, on an idempotent replay, original) proposal.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Operation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/config/proposals/{operation}:
    get:
      operationId: getConfigProposal
      tags: [Config]
      summary: Read a single config proposal, including its redacted diff.
      security:
        - ApiToken: [config:read]
      parameters:
        - $ref: "#/components/parameters/OperationId"
      responses:
        "200":
          description: The proposal.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Operation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/config/proposals/{operation}/apply:
    post:
      operationId: applyConfigProposal
      tags: [Config]
      summary: Execute an ALREADY human-approved config proposal.
      description: >-
        PROPOSAL/APPROVAL SEPARATION (the crux of this endpoint): this
        NEVER approves anything. It only EXECUTES a config.apply/
        config.restore operation that a human administrator has already
        moved to the Approved state through the web console. Calling this
        on a proposal that is not yet approved (or was rejected) returns
        409 `operation_not_approved` — the operation's own state is left
        completely untouched. There is no request parameter, scope, or
        code path anywhere that lets this endpoint approve a proposal
        itself.
      security:
        - ApiToken: [config:apply]
      parameters:
        - $ref: "#/components/parameters/OperationId"
      responses:
        "200":
          description: The now-executed (Succeeded or Failed) operation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Operation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: >-
            The operation has not been approved by a human administrator
            yet (or is not an applicable type/state). Nothing was
            executed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example:
                code: operation_not_approved
                message: This operation has not been approved by a human administrator, or is not in an applicable state.
                details: {}
                correlation_id: "b6b8a6b0-7a2b-4b7a-9c1a-000000000000"
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/plugins:
    get:
      operationId: listPlugins
      tags: [Plugins]
      summary: List installed plugins, cursor-paginated.
      security:
        - ApiToken: [plugins:read]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: A cursor-paginated page of installed plugins.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Plugin" }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/plugins/{filename}:
    get:
      operationId: getPlugin
      tags: [Plugins]
      summary: Show one installed plugin by its jar filename.
      security:
        - ApiToken: [plugins:read]
      parameters:
        - $ref: "#/components/parameters/PluginFilename"
      responses:
        "200":
          description: The installed plugin.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Plugin" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/plugins/{filename}/disable:
    post:
      operationId: disablePlugin
      tags: [Plugins]
      summary: Propose disabling an installed plugin. Never executes anything.
      description: >-
        PROPOSAL/APPROVAL SEPARATION: creates a Proposed plugin.disable
        operation only. A human must separately approve and execute it
        through the web console. Supports `Idempotency-Key`.
      security:
        - ApiToken: [plugins:manage]
      parameters:
        - $ref: "#/components/parameters/PluginFilename"
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      responses:
        "201":
          description: The created (or, on an idempotent replay, original) proposal.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Operation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/plugins/{filename}/remove:
    post:
      operationId: removePlugin
      tags: [Plugins]
      summary: Propose removing an installed plugin. Never executes anything.
      description: >-
        PROPOSAL/APPROVAL SEPARATION: creates a Proposed plugin.remove
        operation only. A human must separately approve and execute it
        through the web console. Supports `Idempotency-Key`.
      security:
        - ApiToken: [plugins:manage]
      parameters:
        - $ref: "#/components/parameters/PluginFilename"
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      responses:
        "201":
          description: The created (or, on an idempotent replay, original) proposal.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Operation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/operations:
    get:
      operationId: listOperations
      tags: [Operations]
      summary: Activity feed — every operation of every type, most recent first.
      security:
        - ApiToken: [activity:read]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: A cursor-paginated page of operations.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Operation" }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/operations/{operation}:
    get:
      operationId: getOperation
      tags: [Operations]
      summary: Show a single operation by id, of any type.
      security:
        - ApiToken: [activity:read]
      parameters:
        - $ref: "#/components/parameters/OperationId"
      responses:
        "200":
          description: The operation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Operation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/v1/operations/rcon-commands:
    post:
      operationId: createRconCommand
      tags: [Operations]
      summary: Propose an RCON console command. Never executes anything.
      description: >-
        PROPOSAL/APPROVAL SEPARATION: creates a Proposed rcon.command
        operation only — this endpoint NEVER approves or executes
        anything, regardless of scope. A `rcon:safe`-only token may
        propose only commands CraftKeeper classifies Safe (a small,
        fixed allow-list); proposing an Elevated command additionally
        requires `rcon:admin`. Either scope only PROPOSES — `rcon:admin`
        may create an elevated proposal but can never approve it. A
        human administrator must separately approve and execute every
        rcon command through the web console. Supports
        `Idempotency-Key`.
      security:
        - ApiToken: [rcon:safe]
        - ApiToken: [rcon:admin]
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command: { type: string, maxLength: 4096, example: "list" }
      responses:
        "201":
          description: The created (or, on an idempotent replay, original) proposal.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Operation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }

components:
  securitySchemes:
    ApiToken:
      type: http
      scheme: bearer
      bearerFormat: "Sanctum personal access token"
      description: >-
        A CraftKeeper personal access token (Laravel Sanctum), created and
        shown exactly once in the web console's Integrations > API page.
        Sent as `Authorization: Bearer <token>`. Every scope below is an
        independent, hard boundary: read scopes never imply write/propose/
        apply/rcon capability, and NO scope, alone or combined, can ever
        approve a proposed mutation.
      x-scopes:
        server:read: Read server status.
        config:read: Read configuration files and proposals.
        config:propose: Propose configuration changes. Never writes anything.
        config:apply: Execute an already human-approved configuration change.
        plugins:read: Read installed plugins.
        plugins:manage: Propose plugin changes (disable/remove). Never executes anything.
        activity:read: Read the operation activity feed.
        rcon:safe: Propose console commands classified Safe.
        rcon:admin: Propose console commands classified Elevated (in addition to Safe). Never approves.

  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      description: An opaque cursor from a previous page's `meta.next_cursor`.
      schema: { type: string }
    PerPage:
      name: per_page
      in: query
      required: false
      description: Page size, 1-100 (default 25).
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    OperationId:
      name: operation
      in: path
      required: true
      description: An Operation's UUID.
      schema: { type: string, format: uuid }
    PluginFilename:
      name: filename
      in: path
      required: true
      description: The installed plugin's jar filename (relative to `plugins/`).
      schema: { type: string }
      example: EssentialsX.jar

  responses:
    Unauthorized:
      description: No valid API token was presented.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            code: unauthenticated
            message: A valid API token is required.
            details: {}
            correlation_id: "b6b8a6b0-7a2b-4b7a-9c1a-000000000001"
    Forbidden:
      description: The token does not carry a required scope.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            code: forbidden_scope
            message: This token does not carry a required scope for this endpoint.
            details: { required_scope: "config:propose" }
            correlation_id: "b6b8a6b0-7a2b-4b7a-9c1a-000000000002"
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            code: not_found
            message: The requested resource was not found.
            details: {}
            correlation_id: "b6b8a6b0-7a2b-4b7a-9c1a-000000000003"
    Conflict:
      description: A stale base_sha256 (optimistic-concurrency conflict) or a reused Idempotency-Key with a different body.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            code: stale_hash
            message: The file has changed since it was last read.
            details: { expected_sha256: "aaaa...", actual_sha256: "bbbb..." }
            correlation_id: "b6b8a6b0-7a2b-4b7a-9c1a-000000000004"
    ValidationError:
      description: The request body failed validation.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            code: validation_failed
            message: The given data was invalid.
            details: { base_sha256: ["The base sha256 field is required."] }
            correlation_id: "b6b8a6b0-7a2b-4b7a-9c1a-000000000005"
    RateLimited:
      description: Too many requests.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            code: rate_limited
            message: Too many requests. Please slow down and try again shortly.
            details: {}
            correlation_id: "b6b8a6b0-7a2b-4b7a-9c1a-000000000006"

  schemas:
    Error:
      type: object
      description: The one error shape every /api/v1 error response uses.
      required: [code, message, details, correlation_id]
      properties:
        code: { type: string, example: forbidden_scope }
        message: { type: string, example: "This token does not carry a required scope for this endpoint." }
        details: { type: object }
        correlation_id: { type: string, format: uuid }

    PaginationMeta:
      type: object
      required: [has_more, next_cursor]
      properties:
        has_more: { type: boolean }
        next_cursor: { type: string, nullable: true }

    ServerStatus:
      type: object
      properties:
        rcon:
          type: object
          properties:
            available: { type: boolean }
            reason: { type: string, nullable: true }
            player_count: { type: integer, nullable: true }
            player_names: { type: array, items: { type: string }, nullable: true }
            sampled_at: { type: string, format: date-time, nullable: true }
        logs:
          type: object
          properties:
            available: { type: boolean }
            reason: { type: string, nullable: true }

    ConfigFile:
      type: object
      properties:
        path: { type: string }
        filename: { type: string }
        format: { type: string }
        category: { type: string }
        provenance: { type: string }
        recognized: { type: boolean }
        schema_title: { type: string, nullable: true }
        size_bytes: { type: integer }

    ConfigFileDetail:
      allOf:
        - $ref: "#/components/schemas/ConfigFile"
        - type: object
          properties:
            modified_at: { type: string, format: date-time }
            base_sha256: { type: string }
            contents:
              type: string
              description: Secret-redacted file contents. Never the raw, unredacted bytes.
            validation:
              type: object
              properties:
                valid: { type: boolean }
                diagnostic_count: { type: integer }

    ConfigProposalInput:
      type: object
      required: [path, base_sha256, changes]
      properties:
        path: { type: string }
        base_sha256:
          type: string
          minLength: 64
          maxLength: 64
          description: The sha256 the caller believes the file currently has.
        changes:
          type: array
          minItems: 1
          items:
            type: object
            required: [path, kind]
            properties:
              path: { type: string }
              kind: { type: string, enum: [replace, add, remove] }
              value: {}

    Operation:
      type: object
      description: >-
        A proposed/approved/executed mutation. `status` never reaches
        "approved" through any /api/v1 endpoint — only the web console's
        session-authenticated, human-only approval action can do that.
      properties:
        id: { type: string, format: uuid }
        type:
          type: string
          enum: [config.apply, config.restore, plugin.install, plugin.update, plugin.disable, plugin.remove, plugin.rollback, rcon.command, server.stop]
        status:
          type: string
          enum: [proposed, approved, running, succeeded, failed, rejected, rolled_back]
        target: { type: string, nullable: true }
        risk: { type: string, enum: [standard, elevated] }
        actor:
          type: object
          properties:
            type: { type: string, enum: [human, mcp, ai, system] }
            id: { type: string, nullable: true }
            origin: { type: string, nullable: true }
        correlation_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }
        approved_at: { type: string, format: date-time, nullable: true }
        rejected_at: { type: string, format: date-time, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        outcome: { type: string, nullable: true }
        error_code: { type: string, nullable: true }
        change_summary:
          type: object
          nullable: true
          description: Present only for config.apply/config.restore operations.
          properties:
            kind: { type: string }
            diff: { type: string, description: Secret-redacted unified diff. }
            valid: { type: boolean }
            diagnostics: { type: array, items: { type: object } }
            restart_impact: { type: string }
            documentation: { type: array, items: { type: object } }
            fields: { type: array, items: { type: object } }
            expires_at: { type: string, format: date-time, nullable: true }

    Plugin:
      type: object
      properties:
        relative_path: { type: string }
        filename: { type: string }
        name: { type: string, nullable: true }
        version: { type: string, nullable: true }
        api_version: { type: string, nullable: true }
        enabled: { type: boolean }
        provenance: { type: string }
        duplicate_name: { type: boolean }
        hard_dependencies: { type: array, items: { type: string } }
        soft_dependencies: { type: array, items: { type: string } }
        compatibility_state: { type: string, nullable: true }
        sha256: { type: string, nullable: true }
        size_bytes: { type: integer, nullable: true }
        last_seen_at: { type: string, format: date-time, nullable: true }
        missing_since: { type: string, format: date-time, nullable: true }
