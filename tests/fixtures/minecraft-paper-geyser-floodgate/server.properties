# CraftKeeper integration fixture — Paper + Geyser + Floodgate.
# rcon.port/rcon.password match docker-compose.integration.yml's fake-rcon
# service exactly (RCON_PASSWORD there) so a real, end-to-end RCON auth
# handshake succeeds inside the integration stack.
enable-rcon=true
rcon.port=25575
rcon.password=craftkeeper-integration-rcon
motd=CraftKeeper Integration Stack
online-mode=false
allow-flight=false
level-name=world
server-port=25565
enable-query=false
white-list=false
