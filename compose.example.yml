services:
  craftkeeper:
    image: ghcr.io/carmelosantana/craftkeeper:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - minecraft:/minecraft
      - craftkeeper_data:/data
    environment:
      APP_URL: https://craftkeeper.example.com
      APP_KEY: ${CRAFTKEEPER_APP_KEY}
      MINECRAFT_ROOT: /minecraft
      DATA_ROOT: /data
      DB_CONNECTION: sqlite
      DB_DATABASE: /data/database.sqlite
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      # Realtime console/operation streaming is optional. `log` disables it
      # and is the image default. To enable live streaming, set this to
      # `reverb` and supply REVERB_APP_ID / REVERB_APP_KEY / REVERB_APP_SECRET
      # — the reverb driver throws at boot if those are missing.
      BROADCAST_CONNECTION: log
      # Task 20: set this to your reverse proxy/load balancer's address
      # (or the Docker network CIDR it connects from) so
      # $request->isSecure() correctly reflects X-Forwarded-Proto from a
      # TLS-terminating proxy in front of this container — required for
      # secure session cookies and the Strict-Transport-Security header
      # to activate. See .env.example's own TRUSTED_PROXIES comment.
      # TRUSTED_PROXIES: "*"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/up"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  minecraft:
    external: true
  craftkeeper_data:
