services:
  craftkeeper:
    # Pinned to an explicit release rather than :latest. Moving tags are
    # published only after the release pipeline's smoke test, vulnerability
    # scan, and Sigstore signing all pass, so :latest is intentionally absent
    # until a release clears every gate. Pinning also means `docker compose
    # pull` never silently moves you to a new major version.
    image: ghcr.io/carmelosantana/craftkeeper:v1.0.1
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - minecraft:/minecraft
      - craftkeeper_data:/data
    environment:
      # Setting this to a real host also switches on Host-header checking:
      # CraftKeeper then answers only to this host, the loopback names, and
      # anything in TRUSTED_HOSTS, so a poisoned Host cannot turn a
      # password-reset link into a link to someone else's domain. If you also
      # reach the panel by LAN address or a second domain, list it:
      #   TRUSTED_HOSTS: "craftkeeper.lan,192.168.1.50"
      APP_URL: https://craftkeeper.example.com
      APP_KEY: ${CRAFTKEEPER_APP_KEY}
      MINECRAFT_ROOT: /minecraft
      DATA_ROOT: /data
      DB_CONNECTION: sqlite
      DB_DATABASE: /data/database.sqlite
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      # Realtime console/operation streaming is optional. `log` disables it
      # and is the image default. To enable live streaming, set this to
      # `reverb` and supply REVERB_APP_ID / REVERB_APP_KEY / REVERB_APP_SECRET
      # — the reverb driver throws at boot if those are missing.
      BROADCAST_CONNECTION: log
      # Task 20: set this to your reverse proxy/load balancer's address
      # (or the Docker network CIDR it connects from) so
      # $request->isSecure() correctly reflects X-Forwarded-Proto from a
      # TLS-terminating proxy in front of this container — required for
      # secure session cookies and the Strict-Transport-Security header
      # to activate. See .env.example's own TRUSTED_PROXIES comment.
      # TRUSTED_PROXIES: "*"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/up"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  minecraft:
    external: true
  craftkeeper_data:
