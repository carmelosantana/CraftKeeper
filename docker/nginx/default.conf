# CraftKeeper Nginx site configuration.
#
# Serves the Laravel application on 8080 and proxies websocket upgrade
# requests at /app to the Reverb server, which Supervisor binds to
# 127.0.0.1:8081 (not publicly exposed on its own).
server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Container-friendly logging: write to the streams Supervisor/Docker
    # already capture instead of files that would need their own rotation.
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Task 20: was 20m — under config/craftkeeper.php's own
    # PLUGIN_MAX_ARTIFACT_BYTES default (100 MiB), so nginx silently 413'd
    # every plugin JAR upload above 20 MiB before PHP (docker/php/
    # uploads.ini's matching upload_max_filesize/post_max_size) ever saw
    # the request. Kept in lockstep with that file's post_max_size.
    client_max_body_size 120m;

    # Never serve dotfiles (.env, .git, etc.) even if one ends up under the
    # document root.
    location ~ /\. {
        deny all;
    }

    location /app {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;

        # Task 20: discovered for real running the integration stack —
        # nginx's default fastcgi_buffer_size (one memory page, 4k on
        # this image) is too small once Illuminate\Http\Middleware\
        # AddLinkHeadersForPreloadedAssets's own long `Link:` preload
        # header (one entry per eagerly-loaded JS/font asset) combines
        # with Task 20's own per-request-nonce Content-Security-Policy
        # header — a real response's status line + headers measured
        # ~5.7 KiB, over the platform default and well past what "upstream
        # sent too big header" tolerates, producing a 502 on EVERY page
        # this app has (not just heavy ones) before this fix. Sized with
        # real headroom above that measurement for future growth (more
        # preloaded chunks, more configured connect-src origins).
        fastcgi_buffer_size 32k;
        fastcgi_buffers 4 32k;
    }
}
