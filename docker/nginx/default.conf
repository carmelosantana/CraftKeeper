# CraftKeeper Nginx site configuration.
#
# Serves the Laravel application on 8080 and proxies websocket upgrade
# requests at /app to the Reverb server, which Supervisor binds to
# 127.0.0.1:8081 (not publicly exposed on its own).
server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Container-friendly logging: write to the streams Supervisor/Docker
    # already capture instead of files that would need their own rotation.
    access_log /dev/stdout;
    error_log /dev/stderr;

    client_max_body_size 20m;

    # Never serve dotfiles (.env, .git, etc.) even if one ends up under the
    # document root.
    location ~ /\. {
        deny all;
    }

    location /app {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }
}
