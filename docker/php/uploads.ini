; Task 20: without this file, PHP falls back to its compiled-in defaults
; (upload_max_filesize=2M, post_max_size=8M) because no php.ini of any
; kind is copied into the runtime image otherwise (this app's PHP images
; never call `cp php.ini-production ...`) — silently rejecting every
; plugin JAR upload larger than a couple of megabytes, well under
; config/craftkeeper.php's own `PLUGIN_MAX_ARTIFACT_BYTES` default
; (100 MiB, see App\Plugins\PluginUploadService/JarInspector). These
; values give that default some headroom (multipart form overhead, plus
; the other propose-step form fields sent alongside the file) and are
; deliberately mirrored by docker/nginx/default.conf's
; `client_max_body_size`, which must stay >= upload_max_filesize or
; nginx will reject the request with a 413 before PHP ever sees it.
;
; An operator who raises PLUGIN_MAX_ARTIFACT_BYTES past 100 MiB at
; runtime (a plain env var) must also raise these two static, build-time
; values (and nginx's client_max_body_size) to match — this file cannot
; itself follow a runtime env var.
upload_max_filesize = 110M
post_max_size = 120M

; A single request only ever needs to buffer one JAR (streamed to disk
; and hashed incrementally by App\Plugins\JarInspector/PluginUploadService,
; never loaded whole into memory) plus this application's normal working
; set — comfortably covered without raising this so far that a runaway
; script could exhaust the container.
memory_limit = 256M
