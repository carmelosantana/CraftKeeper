# CraftKeeper alongside Legendary Java Minecraft (Geyser + Floodgate).
#
# Full walkthrough: docs/installation/legendary-minecraft.md
#
# Before `docker compose up`, set:
#   export CRAFTKEEPER_APP_KEY="base64:$(head -c 32 /dev/urandom | base64)"
#
# The volume-ownership fixes this file used to require (a `chmod 775` on
# /minecraft and a `group_add` matching the server's gid) are gone as of
# 1.1.0 — CraftKeeper's entrypoint reads the volume's owning group at
# startup and adapts to it. See the `craftkeeper` service below.
#
# One manual step remains, because it is the Minecraft server's own
# configuration rather than CraftKeeper's: enable RCON in
# /minecraft/server.properties (enable-rcon=true plus an rcon.password) and
# restart the minecraft service so it takes effect. Enter that password in
# CraftKeeper's onboarding, which tests the connection on save.

services:
  minecraft:
    image: 05jchambers/legendary-minecraft-geyser-floodgate:latest
    container_name: minecraft
    restart: unless-stopped
    ports:
      - "25565:25565"       # Java edition
      - "19132:19132/udp"   # Bedrock edition (Geyser)
    volumes:
      - minecraft:/minecraft
    environment:
      MaxMemory: "4096"
      TZ: America/Denver
    # RCON (25575) is deliberately NOT published to the host. CraftKeeper
    # reaches it over this compose network, so the port stays private.

  craftkeeper:
    # Pinned to an explicit release; see compose.example.yml for why :latest
    # is intentionally not used.
    image: ghcr.io/carmelosantana/craftkeeper:v1.1.0
    container_name: craftkeeper
    restart: unless-stopped
    depends_on:
      - minecraft
    ports:
      - "8080:8080"
    volumes:
      - minecraft:/minecraft          # the SAME volume the server uses
      - craftkeeper_data:/data
    # No `group_add:` and no `chmod` needed. CraftKeeper's entrypoint reads
    # the ownership of the shared volume at startup, joins that group, and
    # ensures the directories it must write are group-writable — then drops
    # to its unprivileged user. Legendary picks its own gid via `useradd -r`,
    # so this is resolved at runtime rather than pinned to a number here.
    environment:
      # Reaching this from another machine — a LAN address, or a domain
      # behind a proxy? Put that hostname here rather than localhost. Doing
      # so also switches on Host-header checking, so CraftKeeper stops
      # answering to hostnames it was never published under and a poisoned
      # Host cannot turn a password-reset link into a link to someone else's
      # domain. Add TRUSTED_HOSTS for any additional names it answers to.
      APP_URL: http://localhost:8080
      APP_KEY: ${CRAFTKEEPER_APP_KEY}
      MINECRAFT_ROOT: /minecraft
      DATA_ROOT: /data
      DB_CONNECTION: sqlite
      DB_DATABASE: /data/database.sqlite
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      # Realtime console and operation streaming. `log` disables it and is
      # the image default; with it off the Console still works, it just shows
      # the last loaded lines instead of updating live.
      #
      # To turn it on, switch this to `reverb` and supply the three
      # credentials below — that is the entire configuration. The app key is
      # published to the browser at runtime (it identifies a websocket
      # client, exactly as a Pusher app key does); the secret never leaves
      # the server. Nothing needs rebuilding, and the websocket follows
      # whatever host and port you publish on, including through a TLS proxy.
      #
      #   BROADCAST_CONNECTION: reverb
      #   REVERB_APP_ID: "900001"
      #   REVERB_APP_KEY: "<random string>"
      #   REVERB_APP_SECRET: "<random string, keep this private>"
      #
      # Generate the pair with e.g. `openssl rand -hex 16`.
      BROADCAST_CONNECTION: log
      # RCON credentials are NOT set here. CraftKeeper keeps the host/port as
      # settings and the password in its encrypted secret store — enter them
      # in onboarding's RCON step (host `minecraft`, port `25575`), which
      # tests the connection on save.
      #
      # Task 20: if you put a TLS-terminating proxy in front of this, set
      # TRUSTED_PROXIES so secure cookies and HSTS activate correctly.
      # TRUSTED_PROXIES: "*"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/up"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  minecraft:
  craftkeeper_data:
