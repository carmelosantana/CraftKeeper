name: Publish Image

# Task 21: builds, scans, SBOMs, attests, signs, and publishes the
# CraftKeeper container image to GHCR — triggered ONLY by pushing a
# `v*` tag (never on every push/PR — see ci.yml for that).
#
# Job graph: build-and-push pushes ONLY the immutable per-version tag
# (`:vX.Y.Z[-prerelease]`) and produces a digest. Three jobs fan out from
# that digest, never a floating tag (a tag can move; a digest cannot):
#   build-and-push --> smoke-test      (does the pushed image actually boot?)
#                  \-> scan            (Trivy vulnerability scan, SARIF —
#                  |                    `exit-code: 1` on CRITICAL/HIGH makes
#                  |                    this job actually FAIL, not just
#                  |                    report, on a real finding)
#                  \-> sign-and-attest (cosign keyless sign + SPDX/CycloneDX
#                                       SBOM generation and attestation)
#
# A fourth job, publish-moving-tags, has `needs: [build-and-push,
# smoke-test, scan, sign-and-attest]` — only once the boot check, the
# vulnerability gate, AND signing+attestation all pass does it point
# `:vX`, `:vX.Y`, and (final releases only) `:latest` at the
# already-pushed, already-verified digest via `docker buildx imagetools
# create` (no rebuild — same bytes, new pointers). Gating on
# sign-and-attest too means a Fulcio/Rekor outage or a syft/cosign
# failure withholds the moving tags rather than leaving `:latest`
# pointed at an image nothing ever signed, even though README.md tells
# operators to `cosign verify` that exact tag. A prerelease tag
# publishes ONLY its exact `:vX.Y.Z-rc.N`; `:latest`, `:vX`, and
# `:vX.Y` are all withheld for it, so a pinned `:v1`/`:v1.2` operator is
# never silently moved onto a release candidate.
#
# Supply-chain posture:
#   - Every third-party action pinned to a full commit SHA (see ci.yml's
#     header for how each was resolved).
#   - Top-level `permissions: contents: read`. Each job below declares
#     its OWN minimal elevation; `id-token: write` (required for keyless
#     Sigstore/Cosign) appears on exactly one job — sign-and-attest — and
#     nowhere else in this file or ci.yml.
#   - No `pull_request_target` anywhere; this workflow doesn't trigger on
#     pull_request at all.
#   - `latest` is never published for a prerelease tag, and no moving tag
#     (`:latest`, `:vX`, `:vX.Y`) is published for ANY tag until
#     smoke-test + scan + sign-and-attest all succeed (see "Compute image
#     tags" and "publish-moving-tags" below) — implemented as explicit,
#     auditable checks and job dependencies, not left to an action's
#     implicit behavior or to publish-then-verify ordering.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  IMAGE: ghcr.io/carmelosantana/craftkeeper

jobs:
  build-and-push:
    name: Build and push (linux/amd64, linux/arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ steps.ref.outputs.image_ref }}
      is_prerelease: ${{ steps.tags.outputs.is_prerelease }}
      moving_tags: ${{ steps.tags.outputs.moving_tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Explicit, auditable tag computation — deliberately NOT delegated
      # to an action's implicit semver/prerelease heuristic. A v*.*.*-<...>
      # tag (rc, beta, alpha — any hyphenated pre-release suffix per
      # SemVer 2.0.0 §9) computes v<major>.<minor>.<patch> ONLY.
      #
      # Only the immutable, never-reused `full_tag` is pushed by THIS job.
      # `:vX`, `:vX.Y`, and `:latest` are "moving" tags — they are computed
      # here as `moving_tags` but only ever applied by the publish-moving-
      # tags job below, and only once smoke-test + scan both pass. A
      # prerelease computes an EMPTY `moving_tags` — it publishes only its
      # exact `full_tag`, so a pinned `:v1`/`:v1.2` operator can never be
      # silently moved onto a release candidate.
      - name: Compute image tags and prerelease guard
        id: tags
        run: |
          set -euo pipefail
          REF="${GITHUB_REF_NAME}"

          if [[ ! "$REF" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$REF' is not a valid vMAJOR.MINOR.PATCH[-prerelease] version. Refusing to publish."
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          PRERELEASE="${BASH_REMATCH[4]:-}"

          FULL_TAG="${IMAGE}:v${MAJOR}.${MINOR}.${PATCH}"

          if [ -z "$PRERELEASE" ]; then
            MOVING_TAGS="${IMAGE}:v${MAJOR}.${MINOR},${IMAGE}:v${MAJOR},${IMAGE}:latest"
            echo "::notice::'$REF' is a final release — :v${MAJOR}, :v${MAJOR}.${MINOR}, and :latest will be published once smoke-test + scan pass."
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            MOVING_TAGS=""
            echo "::notice::'$REF' is a PRERELEASE ('$PRERELEASE') — only '${FULL_TAG}' will be published. :latest, :v${MAJOR}, and :v${MAJOR}.${MINOR} are all withheld."
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

          echo "full_tag=${FULL_TAG}" >> "$GITHUB_OUTPUT"
          echo "moving_tags=${MOVING_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.full_tag }}
          provenance: true
          sbom: true
          labels: |
            org.opencontainers.image.source=https://github.com/carmelosantana/craftkeeper
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      # `jobs.<id>.outputs` does NOT have the `env` context available
      # (only github, needs, strategy, matrix, secrets, steps, inputs,
      # vars) — a bare `${{ env.IMAGE }}` in the `outputs:` block above
      # would silently render as empty, breaking every downstream
      # consumer (smoke-test, scan, sign-and-attest, publish-moving-tags).
      # Compute the full reference here, in a step, where `env`/shell
      # variables ARE available, and expose it as a step output instead.
      # The digest is passed through `env:` rather than interpolated directly
      # into the run block. zizmor's template-injection audit flags any
      # `${{ ... }}` expanded into shell source, because the expansion happens
      # before the shell sees the line. This one is not attacker-controllable
      # (docker/build-push-action produces the digest), but routing it through
      # an environment variable removes the class of bug entirely instead of
      # suppressing the finding, and costs nothing.
      - name: Compute digest-pinned image reference
        id: ref
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "image_ref=${IMAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Summary
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          FULL_TAG: ${{ steps.tags.outputs.full_tag }}
          MOVING_TAGS: ${{ steps.tags.outputs.moving_tags }}
        run: |
          echo "### Published ${IMAGE}@${DIGEST}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Immutable tag: ${FULL_TAG}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${MOVING_TAGS}" ]; then
            echo "Moving tags (published only after smoke-test + scan pass): ${MOVING_TAGS}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Prerelease: no moving tags (:latest, :vX, :vX.Y) published for this tag." >> "$GITHUB_STEP_SUMMARY"
          fi

  smoke-test:
    name: Container smoke test
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run the published image (native arch)
        run: |
          docker run -d --name craftkeeper-smoke -p 8080:8080 \
            -e APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA= \
            -e APP_ENV=production \
            "${IMAGE_REF}"

      - name: Wait for /up
        run: |
          for i in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/up; then
              echo "healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Container never became healthy"
          docker logs craftkeeper-smoke
          exit 1

      - name: Container logs on failure
        if: failure()
        run: docker logs craftkeeper-smoke || true

      - name: Remove the smoke-test container (this job's own resource only)
        if: always()
        run: docker rm -f craftkeeper-smoke || true

  scan:
    name: Vulnerability scan (Trivy)
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # `exit-code: '1'` is load-bearing, not cosmetic: without it,
      # trivy-action always exits 0 regardless of findings, so this job
      # would report "success" to `needs:` even with a CRITICAL CVE
      # present — silently defeating the publish-moving-tags gate below.
      # With it, a CRITICAL/HIGH finding fails this job, which in turn
      # blocks publish-moving-tags from ever moving :latest/:vX/:vX.Y.
      #
      # `ignore-unfixed: true` keeps that gate meaningful instead of
      # permanently red. The v1.0.0 scan produced 209 CRITICAL/HIGH findings
      # and blocked the release, but Debian stable permanently carries CVEs
      # its maintainers have assessed as minor or won't-fix (zlib
      # CVE-2023-45853 is the standard example). Blocking on those means the
      # gate can never pass no matter what we do, which only teaches people to
      # bypass it. Reporting only vulnerabilities with an available fix makes
      # a failure mean something actionable: "a fix exists and we have not
      # taken it." That took 209 findings down to 4.
      #
      # Those last 4 are linux-libc-dev (kernel headers, inapplicable to a
      # container) and are listed individually, with expiry dates, in
      # .trivyignore.yaml. See that file for the full rationale.
      #
      # The scan still runs at full breadth — every severity, including
      # everything ignored here, is uploaded to the Security tab by the next
      # step. Only the *blocking* set is narrowed to what we can act on.
      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.build-and-push.outputs.image_ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          scanners: vuln
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          exit-code: '1'

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-results
          path: trivy-results.sarif
          if-no-files-found: ignore
          retention-days: 30

  publish-moving-tags:
    name: Publish moving tags (:vX, :vX.Y, :latest)
    # This is the Important-4 fix: previously, moving-tag publication
    # happened as part of the same push as the build, BEFORE smoke-test
    # and scan ran at all — a CRITICAL CVE (or a boot failure) would
    # still leave `:latest` pointed at the bad image, with a green
    # pipeline overall (Trivy had no exit-code). It also previously ran
    # in parallel with sign-and-attest rather than waiting on it, so a
    # Fulcio/Rekor outage or a syft failure could leave `:latest`/`:vX`/
    # `:vX.Y` live and pointed at an unsigned, unattested image while
    # README.md still tells operators to `cosign verify` that exact tag.
    # Now, `:latest`/`:vX`/`:vX.Y` are only ever pointed at the digest
    # AFTER all three gates — smoke-test, scan, AND sign-and-attest —
    # pass.
    needs: [build-and-push, smoke-test, scan, sign-and-attest]
    if: needs.build-and-push.outputs.moving_tags != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
      MOVING_TAGS: ${{ needs.build-and-push.outputs.moving_tags }}
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Re-tags the manifest already pushed by build-and-push and already
      # verified by smoke-test + scan, and already signed and attested by
      # sign-and-attest — no rebuild, no new bytes pushed, just additional
      # pointers at the exact digest those jobs checked/signed.
      - name: Point each moving tag at the verified digest
        run: |
          set -euo pipefail
          IFS=',' read -ra TAGS <<< "${MOVING_TAGS}"
          ARGS=()
          for t in "${TAGS[@]}"; do
            ARGS+=(--tag "$t")
          done
          docker buildx imagetools create "${ARGS[@]}" "${IMAGE_REF}"

  sign-and-attest:
    name: Sign + SBOM (SPDX, CycloneDX) + provenance
    needs: build-and-push
    runs-on: ubuntu-latest
    # id-token: write appears on THIS job ONLY, in ci.yml or image.yml —
    # keyless Sigstore/Cosign signing and attestation are the only
    # operations in this repository that need a GitHub OIDC token.
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # upload-release-assets: false is required, not cosmetic. When the
      # workflow is triggered by a tag that has a GitHub Release,
      # anchore/sbom-action tries to attach the SBOM to that release, which
      # needs `contents: write`. This job intentionally holds only
      # `id-token: write` (for keyless Sigstore) and `packages: write` — it
      # is the most privileged job in the pipeline and must not also gain
      # write access to repository contents just to publish an attachment.
      # The SBOMs are still uploaded as workflow artifacts below and attached
      # to the image itself via `cosign attest`, which is the copy that
      # matters for verification.
      #
      # Without this, SBOM generation succeeds and the step still fails with
      # "Resource not accessible by integration", taking down the signing job
      # and (correctly) blocking the moving-tag publish behind it.
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ needs.build-and-push.outputs.image_ref }}
          format: spdx-json
          output-file: craftkeeper.spdx.json
          upload-release-assets: false

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ needs.build-and-push.outputs.image_ref }}
          format: cyclonedx-json
          output-file: craftkeeper.cyclonedx.json
          upload-release-assets: false

      - name: Upload SBOMs as workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sboms
          path: |
            craftkeeper.spdx.json
            craftkeeper.cyclonedx.json
          retention-days: 90

      # Keyless: cosign authenticates to Sigstore's public Fulcio/Rekor
      # using THIS job's GitHub OIDC token (id-token: write above) — no
      # private key, no long-lived secret, nothing to rotate or leak.
      - name: Sign the manifest (keyless Sigstore)
        run: cosign sign --yes "${IMAGE_REF}"

      - name: Attest SPDX SBOM
        run: |
          cosign attest --yes \
            --predicate craftkeeper.spdx.json \
            --type spdxjson \
            "${IMAGE_REF}"

      - name: Attest CycloneDX SBOM
        run: |
          cosign attest --yes \
            --predicate craftkeeper.cyclonedx.json \
            --type cyclonedx \
            "${IMAGE_REF}"
