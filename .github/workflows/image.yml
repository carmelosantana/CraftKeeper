name: Publish Image

# Task 21: builds, scans, SBOMs, attests, signs, and publishes the
# CraftKeeper container image to GHCR — triggered ONLY by pushing a
# `v*` tag (never on every push/PR — see ci.yml for that).
#
# Job graph: build-and-push (the only job that pushes pixels) fans out to
# three independent verification/attestation jobs that all target the
# digest it produced, never a floating tag (a tag can move; a digest
# cannot):
#   build-and-push --> smoke-test   (does the pushed image actually boot?)
#                  \-> scan         (Trivy vulnerability scan, SARIF)
#                  \-> sign-and-attest (cosign keyless sign + SPDX/CycloneDX
#                                       SBOM generation and attestation)
#
# Supply-chain posture:
#   - Every third-party action pinned to a full commit SHA (see ci.yml's
#     header for how each was resolved).
#   - Top-level `permissions: contents: read`. Each job below declares
#     its OWN minimal elevation; `id-token: write` (required for keyless
#     Sigstore/Cosign) appears on exactly one job — sign-and-attest — and
#     nowhere else in this file or ci.yml.
#   - No `pull_request_target` anywhere; this workflow doesn't trigger on
#     pull_request at all.
#   - `latest` is never published for a prerelease tag (see "Compute
#     tags" below) — implemented as an explicit, auditable regex check on
#     the pushed tag name, not left to an action's implicit behavior.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  IMAGE: ghcr.io/carmelosantana/craftkeeper

jobs:
  build-and-push:
    name: Build and push (linux/amd64, linux/arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
      is_prerelease: ${{ steps.tags.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Explicit, auditable tag computation — deliberately NOT delegated
      # to an action's implicit semver/prerelease heuristic. A v*.*.*-<...>
      # tag (rc, beta, alpha — any hyphenated pre-release suffix per
      # SemVer 2.0.0 §9) computes v<major>.<minor>.<patch> ONLY and
      # explicitly withholds `:latest`.
      - name: Compute image tags and prerelease guard
        id: tags
        run: |
          set -euo pipefail
          REF="${GITHUB_REF_NAME}"

          if [[ ! "$REF" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$REF' is not a valid vMAJOR.MINOR.PATCH[-prerelease] version. Refusing to publish."
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          PRERELEASE="${BASH_REMATCH[4]:-}"

          TAGS="${IMAGE}:v${MAJOR}.${MINOR}.${PATCH}"
          TAGS="${TAGS},${IMAGE}:v${MAJOR}.${MINOR}"
          TAGS="${TAGS},${IMAGE}:v${MAJOR}"

          if [ -z "$PRERELEASE" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
            echo "::notice::'$REF' is a final release — publishing :latest."
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::'$REF' is a PRERELEASE ('$PRERELEASE') — :latest will NOT be published."
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: true
          sbom: true
          labels: |
            org.opencontainers.image.source=https://github.com/carmelosantana/craftkeeper
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - name: Summary
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          PUBLISHED_TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          echo "### Published ${IMAGE}@${DIGEST}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags: ${PUBLISHED_TAGS}" >> "$GITHUB_STEP_SUMMARY"

  smoke-test:
    name: Container smoke test
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run the published image (native arch)
        run: |
          docker run -d --name craftkeeper-smoke -p 8080:8080 \
            -e APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA= \
            -e APP_ENV=production \
            "${IMAGE_REF}"

      - name: Wait for /up
        run: |
          for i in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/up; then
              echo "healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Container never became healthy"
          docker logs craftkeeper-smoke
          exit 1

      - name: Container logs on failure
        if: failure()
        run: docker logs craftkeeper-smoke || true

      - name: Remove the smoke-test container (this job's own resource only)
        if: always()
        run: docker rm -f craftkeeper-smoke || true

  scan:
    name: Vulnerability scan (Trivy)
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ needs.build-and-push.outputs.image_ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          scanners: vuln

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-results
          path: trivy-results.sarif
          if-no-files-found: ignore
          retention-days: 30

  sign-and-attest:
    name: Sign + SBOM (SPDX, CycloneDX) + provenance
    needs: build-and-push
    runs-on: ubuntu-latest
    # id-token: write appears on THIS job ONLY, in ci.yml or image.yml —
    # keyless Sigstore/Cosign signing and attestation are the only
    # operations in this repository that need a GitHub OIDC token.
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ needs.build-and-push.outputs.image_ref }}
          format: spdx-json
          output-file: craftkeeper.spdx.json

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ needs.build-and-push.outputs.image_ref }}
          format: cyclonedx-json
          output-file: craftkeeper.cyclonedx.json

      - name: Upload SBOMs as workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sboms
          path: |
            craftkeeper.spdx.json
            craftkeeper.cyclonedx.json
          retention-days: 90

      # Keyless: cosign authenticates to Sigstore's public Fulcio/Rekor
      # using THIS job's GitHub OIDC token (id-token: write above) — no
      # private key, no long-lived secret, nothing to rotate or leak.
      - name: Sign the manifest (keyless Sigstore)
        run: cosign sign --yes "${IMAGE_REF}"

      - name: Attest SPDX SBOM
        run: |
          cosign attest --yes \
            --predicate craftkeeper.spdx.json \
            --type spdxjson \
            "${IMAGE_REF}"

      - name: Attest CycloneDX SBOM
        run: |
          cosign attest --yes \
            --predicate craftkeeper.cyclonedx.json \
            --type cyclonedx \
            "${IMAGE_REF}"
